openapi: 3.0.3
info:
  title: Movo API
  version: 1.0.0
  description: API documentation for Movo services.
paths:
  /api/bookkeeping/accounts/:
    get:
      operationId: bookkeeping_accounts_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/accounts/close-day/:
    post:
      operationId: bookkeeping_accounts_close_day_create
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/accounts/daily-summary/:
    get:
      operationId: bookkeeping_accounts_daily_summary_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/accounts/ledger/:
    get:
      operationId: bookkeeping_accounts_ledger_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/available-batches/:
    get:
      operationId: bookkeeping_available_batches_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/expense-types/:
    get:
      operationId: bookkeeping_expense_types_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/expenses/:
    get:
      operationId: bookkeeping_expenses_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: bookkeeping_expenses_create
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/transfers/:
    get:
      operationId: bookkeeping_transfers_retrieve
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: bookkeeping_transfers_create
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/bookkeeping/transport-expenses/:
    post:
      operationId: bookkeeping_transport_expenses_create
      tags:
      - bookkeeping
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/batches/:
    get:
      operationId: intercity_batches_retrieve
      description: Get all batches sent from or to the staff member's branch
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/batches/{batch_id}/:
    get:
      operationId: intercity_batches_retrieve_2
      description: Get batch details and all packages in it
      parameters:
      - in: path
        name: batch_id
        schema:
          type: integer
        required: true
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/check-payment/:
    get:
      operationId: intercity_check_payment_retrieve
      description: Check the status of a PaymentRequest
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/create-package/:
    get:
      operationId: intercity_create_package_retrieve
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/create-pre-package/:
    post:
      operationId: intercity_create_pre_package_create
      tags:
      - intercity
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/intercity/dispatch-package/:
    get:
      operationId: intercity_dispatch_package_retrieve
      description: |-
        Search for package by receiver code and retrieve details

        Query params: receiver_code
        Returns: receiver_name, package_code, sender_phone, receiver_phone, is_pay_forward, amounts, payment method/currency
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: intercity_dispatch_package_create
      description: |-
        Mark package as collected/dispatched

        Required fields:
        - receiver_code: The OTP code printed on the package label
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/receive-package/:
    get:
      operationId: intercity_receive_package_retrieve
      description: |-
        Step 1: Search for package by code and retrieve details

        Query params: package_code
        Returns: sender details, receiver details, collection point, date added
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: intercity_receive_package_create
      description: |-
        Step 2 & 3: Add dimensions, description, and payment details, then finalize

        Required fields:
        - package_code: Pre-package creation code
        - step: "dimensions" for step 2, "payment" for step 3

        Step 2 (dimensions):
        - length, width, height, weight
        - description

        Step 3 (payment):
        - is_pay_forward: boolean
        - payment_method: "cash" or "ecocash"
        - currency: "usd" or "zwl"
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intercity/request-payment/:
    post:
      operationId: intercity_request_payment_create
      description: Create a PaymentRequest (simulates requesting mobile money payment)
      tags:
      - intercity
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/intracity/amount/:
    get:
      operationId: intracity_amount_retrieve
      tags:
      - intracity
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: intracity_amount_create
      tags:
      - intracity
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/intracity/assign-pending-packages/:
    post:
      operationId: intracity_assign_pending_packages_create
      tags:
      - Delivery
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignPendingPackagesResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
  /api/intracity/cancel-order/:
    post:
      operationId: intracity_cancel_order_create
      tags:
      - Delivery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Only sender or receiver can cancel
  /api/intracity/create-package/:
    post:
      operationId: intracity_create_package_create
      tags:
      - Packages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PackageCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PackageCreate'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageDetail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
  /api/intracity/dropoff-verify/:
    post:
      operationId: intracity_dropoff_verify_create
      tags:
      - Delivery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DropoffVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DropoffVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DropoffVerificationRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DropoffVerificationResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Package assigned to another rider
  /api/intracity/ecocash-payment/:
    post:
      operationId: intracity_ecocash_payment_create
      tags:
      - intracity
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/intracity/package/:
    get:
      operationId: intracity_package_retrieve
      parameters:
      - in: query
        name: package_id
        schema:
          type: integer
        required: true
      tags:
      - Packages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageDetail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
  /api/intracity/packages/:
    get:
      operationId: intracity_packages_retrieve
      tags:
      - Packages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
  /api/intracity/pickup-verify/:
    post:
      operationId: intracity_pickup_verify_create
      tags:
      - Delivery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PickupVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PickupVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PickupVerificationRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickupVerificationResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Incorrect request parameters
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Package assigned to another rider
  /api/users/customer/profile/:
    get:
      operationId: users_customer_profile_retrieve
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer profile not found
    patch:
      operationId: users_customer_profile_partial_update
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCustomerProfilePatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCustomerProfilePatchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCustomerProfilePatchRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfileResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Missing required name fields or profile already completed
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer profile not found
  /api/users/otp/:
    post:
      operationId: users_otp_create
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OTPCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OTPCreateRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTPCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Phone number is required
  /api/users/refresh/:
    post:
      operationId: users_refresh_create
      description: Refresh access tokens using a valid refresh token.
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Missing or invalid refresh token
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: User not found for this token
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Inactive user
  /api/users/register-login/:
    post:
      operationId: users_register_login_create
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegisterLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomerRegisterLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomerRegisterLoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Missing, invalid, or expired OTP
  /api/users/staff/login/:
    post:
      operationId: users_staff_login_create
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Inactive user
  /api/users/staff/profile/:
    get:
      operationId: users_staff_profile_retrieve
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffProfileResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Staff profile not found
components:
  schemas:
    AssignPendingPackagesResponse:
      type: object
      properties:
        message:
          type: string
        assigned_count:
          type: integer
        unassigned_count:
          type: integer
        assigned_packages:
          type: array
          items:
            $ref: '#/components/schemas/AssignedPackage'
      required:
      - assigned_count
      - assigned_packages
      - message
      - unassigned_count
    AssignedPackage:
      type: object
      properties:
        package_id:
          type: integer
        is_fast_delivery:
          type: boolean
        assigned_biker_id:
          type: integer
        assigned_biker_name:
          type: string
        assigned_at:
          type: string
          format: date-time
        added_at:
          type: string
          format: date-time
      required:
      - added_at
      - assigned_at
      - assigned_biker_id
      - assigned_biker_name
      - is_fast_delivery
      - package_id
    CancelOrderRequest:
      type: object
      properties:
        package_id:
          type: integer
    CancelOrderResponse:
      type: object
      properties:
        message:
          type: string
        package_id:
          type: integer
        status:
          type: string
      required:
      - message
      - package_id
      - status
    CustomerProfileResponse:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        is_profile_complete:
          type: boolean
      required:
      - first_name
      - is_profile_complete
      - last_name
    CustomerRegisterLoginRequest:
      type: object
      properties:
        phone_number:
          type: string
        otp_code:
          type: string
      required:
      - otp_code
      - phone_number
    DropoffVerificationRequest:
      type: object
      properties:
        package_id:
          type: integer
        receiver_code:
          type: string
    DropoffVerificationResponse:
      type: object
      properties:
        message:
          type: string
        package_id:
          type: integer
        status:
          type: string
        delivered_at:
          type: string
          format: date-time
      required:
      - delivered_at
      - message
      - package_id
      - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
      - error
    InitiatedByEnum:
      enum:
      - sender
      - receiver
      type: string
      description: |-
        * `sender` - sender
        * `receiver` - receiver
    OTPCreateRequest:
      type: object
      properties:
        phone_number:
          type: string
      required:
      - phone_number
    OTPCreateResponse:
      type: object
      properties:
        otp:
          type: string
      required:
      - otp
    PackageCreate:
      type: object
      properties:
        phone:
          type: string
        name:
          type: string
        pickup_location:
          type: string
        dropoff_location:
          type: string
        comments:
          type: string
          nullable: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        is_fast_delivery:
          type: boolean
          default: false
        is_pay_forward:
          type: boolean
          default: false
        initiated_by:
          allOf:
          - $ref: '#/components/schemas/InitiatedByEnum'
          default: sender
    PackageDetail:
      type: object
      properties:
        package_id:
          type: integer
        slug:
          type: string
        receiver_id:
          type: integer
        receiver_name:
          type: string
        sender_id:
          type: integer
        sender_name:
          type: string
        pickup_location:
          type: string
        dropoff_location:
          type: string
        status:
          type: string
        city:
          type: string
        driver_id:
          type: integer
          nullable: true
        driver_name:
          type: string
          nullable: true
        receiver_code:
          type: string
        comments:
          type: string
          nullable: true
        is_sender_initiated:
          type: boolean
        assigned_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
        added_at:
          type: string
          format: date-time
        invoice_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        invoice_amount_zig:
          type: string
          format: decimal
          pattern: ^-?\d{0,18}(?:\.\d{0,2})?$
          nullable: true
      required:
      - added_at
      - assigned_at
      - city
      - comments
      - delivered_at
      - driver_id
      - driver_name
      - dropoff_location
      - invoice_amount
      - invoice_amount_zig
      - is_sender_initiated
      - package_id
      - pickup_location
      - receiver_code
      - receiver_id
      - receiver_name
      - sender_id
      - sender_name
      - slug
      - status
    PackageList:
      type: object
      properties:
        count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PackageListItem'
      required:
      - count
      - results
    PackageListItem:
      type: object
      properties:
        package_id:
          type: integer
        role:
          type: string
        status:
          type: string
        city:
          type: string
        pickup_location:
          type: string
        dropoff_location:
          type: string
        is_fast_delivery:
          type: boolean
        sender_name:
          type: string
        receiver_name:
          type: string
        assigned_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
        added_at:
          type: string
          format: date-time
      required:
      - added_at
      - assigned_at
      - city
      - delivered_at
      - dropoff_location
      - is_fast_delivery
      - package_id
      - pickup_location
      - receiver_name
      - role
      - sender_name
      - status
    PatchedCustomerProfilePatchRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
    PickupVerificationRequest:
      type: object
      properties:
        package_id:
          type: integer
        sender_code:
          type: string
    PickupVerificationResponse:
      type: object
      properties:
        message:
          type: string
        package_id:
          type: integer
        status:
          type: string
      required:
      - message
      - package_id
      - status
    StaffLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    StaffProfileResponse:
      type: object
      properties:
        staff_id:
          type: integer
        branch_id:
          type: integer
        branch_name:
          type: string
